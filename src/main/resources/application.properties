# Application Name
spring.application.name=DG_BlogApp

# Server Configuration
server.port=8085

# PostgreSQL Configuration

spring.datasource.url=${SPRING_DATASOURCE_URL}
#spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.devtools.livereload.enabled=false

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# AWS Configuration
cloud.aws.s3.endpoint=${AWS_ENDPOINT:http://localhost:4566}
cloud.aws.region.static=${AWS_REGION:us-east-1}
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:test}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:test}
cloud.aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:blog-images}
cloud.aws.s3.path-style-access=true
  #  for production i.e. AWS it should be false it will use virtual thread

ba.bucket=asd

# Multipart Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.file-size-threshold=2MB
# FILE>2MB will be stored on the disk

# Logging Configuration
logging.level.org.springframework=INFO
logging.level.org.blogapp.dg_blogapp=DEBUG

jwt.secret=U+twmKLawF7A/itZMkNM2GK8IRj+4LgIC7WJxe4YT1HFzAqWxEhCxWAihc9MkfaMNeTTQROz5aIq9557okwitQ==
jwt.access-token-expiration=86400000
jwt.refresh-token-expiration=604800000

#khalti Configuration
khalti.base-url=${KHALTI_BASE_URL}
khalti.public-key=${KHALTI_PUBLIC_KEY}
khalti.secret-key=${KHALTI_SECRET_KEY}
khalti.initiate-path=/api/v2/epayment/initiate/
khalti.verify-path=/api/v2/epayment/lookup/
khalti.return-url=${KHALTI_RETURN_URL}
khalti.website-url=${KHALTI_WEBSITE_URL}


# Development (localhost) - leave empty
app.cookie.domain=
# Production - use your main domain
#app.cookie.domain=spacewrites.com


spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379


springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tryItOutEnabled=true




